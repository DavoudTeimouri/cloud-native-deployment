---
# KubeSpray Deployment Playbook
# Wraps KubeSpray cluster.yml for consistent deployment
# Usage: ansible-playbook -i inventory/<cluster>/hosts.yml playbooks/kubespray-deploy.yml

- name: Pre-flight Checks
  hosts: all
  become: true
  gather_facts: true
  tags: [preflight]
  vars:
    kubespray_version: "{{ lookup('env', 'KUBESPRAY_VERSION') | default('v2.26.0', true) }}"

  tasks:
    - name: Verify OS is Ubuntu 22.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version == "22"
        fail_msg: "Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Verify swap is disabled
      ansible.builtin.command: swapon --show
      register: swap_check
      changed_when: false
      failed_when: swap_check.stdout | length > 0

    - name: Verify containerd is running
      ansible.builtin.systemd:
        name: containerd
      register: containerd_status
      failed_when: not containerd_status.status.ActiveState == "active"

    - name: Verify chrony is synced
      ansible.builtin.command: chronyc tracking
      register: chrony_status
      changed_when: false
      failed_when: "'Leap status' not in chrony_status.stdout"

    - name: Verify DNS resolution
      ansible.builtin.command: nslookup kubernetes.default.svc.cluster.local
      register: dns_check
      changed_when: false
      failed_when: false
      # Will fail before K8s is deployed, that's OK

    - name: Verify /var/lib/etcd is on separate mount (masters only)
      ansible.builtin.stat:
        path: /var/lib/etcd
      register: etcd_dir
      when: "'kube_control_plane' in group_names"

    - name: Display preflight summary
      ansible.builtin.debug:
        msg: |
          === Pre-flight Check Summary ===
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Swap: Disabled
          Containerd: Running
          NTP: Synced
          Node: {{ inventory_hostname }}
          Role: {{ 'Control Plane' if 'kube_control_plane' in group_names else 'Worker' if 'kube_node' in group_names else 'Other' }}

- name: Deploy Kubernetes via KubeSpray
  import_playbook: "{{ lookup('env', 'KUBESPRAY_PATH') | default('../kubespray/cluster.yml', true) }}"
  tags: [deploy]

- name: Post-deployment Verification
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tags: [verify]
  vars:
    kubeconfig: /etc/kubernetes/admin.conf

  tasks:
    - name: Fetch kubeconfig
      ansible.builtin.fetch:
        src: "{{ kubeconfig }}"
        dest: "./kubeconfig-{{ cluster_name }}.yaml"
        flat: true

    - name: Verify all nodes are Ready
      ansible.builtin.command: kubectl --kubeconfig={{ kubeconfig }} get nodes -o json
      register: nodes_output
      changed_when: false
      retries: 10
      delay: 10
      until: >
        (nodes_output.stdout | from_json).items | map(attribute='status.conditions') | flatten |
        selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length
        == groups['kube_node'] | length + groups['kube_control_plane'] | length

    - name: Verify all system pods are Running
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig }} get pods -n kube-system
        --no-headers --field-selector=status.phase!=Running
      register: bad_pods
      changed_when: false
      failed_when: bad_pods.stdout | length > 0
      retries: 15
      delay: 10

    - name: Display cluster status
      ansible.builtin.command: kubectl --kubeconfig={{ kubeconfig }} get nodes -o wide
      register: cluster_status
      changed_when: false

    - name: Show cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_status.stdout_lines }}"

    - name: Display next steps
      ansible.builtin.debug:
        msg: |
          ========================================
          Kubernetes cluster '{{ cluster_name }}' deployed successfully!
          ========================================

          Next steps:
          1. Copy kubeconfig: ./kubeconfig-{{ cluster_name }}.yaml
          2. Deploy Ceph (if bare-metal): ansible-playbook -i inventory/ ceph-deploy.yml
          3. Deploy Rook-Ceph (if using): ansible-playbook -i inventory/ rook-ceph-deploy.yml
          4. Deploy MetalLB (app cluster only): ansible-playbook -i inventory/ metallb-deploy.yml
          5. Deploy NGINX Ingress: ansible-playbook -i inventory/ ingress-deploy.yml
          6. Deploy cert-manager: ansible-playbook -i inventory/ cert-manager-deploy.yml
          7. Deploy Gatekeeper: ansible-playbook -i inventory/ gatekeeper-deploy.yml
          8. Deploy monitoring: ansible-playbook -i inventory/ monitoring-deploy.yml
          9. Deploy Rancher (mgmt only): ansible-playbook -i inventory/ rancher-deploy.yml
          10. Deploy ArgoCD (mgmt only): ansible-playbook -i inventory/ argocd-deploy.yml
