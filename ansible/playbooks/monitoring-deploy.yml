---
# Deploy Monitoring Stack (Prometheus/Grafana/Alertmanager, Loki/Promtail)
# Deploy Logging Stack (Loki + Promtail)
# Deploy Velero Backup (with Velero UI)
# Usage: ansible-playbook -i inventory/<cluster>/hosts.yml playbooks/monitoring-deploy.yml --tags <component>

- name: Deploy kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tags: [prometheus, monitoring]
  vars:
    monitoring_namespace: monitoring
    prometheus_chart_version: "67.5.0"
    harbor_url: "{{ lookup('env', 'HARBOR_URL') | default('harbor.internal', true) }}"
    storage_class: "{{ lookup('env', 'STORAGE_CLASS') | default('cephfs', true) }}"
    retention: "30d"

  tasks:
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ monitoring_namespace }}"

    - name: Add Prometheus Community Helm repo
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: "https://prometheus-community.github.io/helm-charts"

    - name: Deploy kube-prometheus-stack
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: "{{ prometheus_chart_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        values:
          defaultRules:
            create: true
            rules:
              alertmanager: true
              etcd: true
              configReloaders: true
              general: true
              k8s: true
              kubeApiserverAvailability: true
              kubeApiserverBurnrate: true
              kubeApiserverSlos: true
              kubelet: true
              kubePrometheusGeneral: true
              kubePrometheusNodeRecording: true
              kubernetesApps: true
              kubernetesMisc: true
              kubernetesStorage: true
              kubernetesSystem: true
              network: true
              node: true
              nodeExporterAlerting: true
              nodeExporterRecording: true
              prometheus: true
              prometheusOperator: true

          prometheus:
            prometheusSpec:
              retention: "{{ retention }}"
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "{{ storage_class }}"
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 50Gi
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                limits:
                  cpu: "2"
                  memory: 8Gi
              image:
                repository: "{{ harbor_url }}/prometheus/prometheus"
              additionalScrapeConfigs: []

          alertmanager:
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "{{ storage_class }}"
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 10Gi
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi

          grafana:
            persistence:
              enabled: true
              storageClassName: "{{ storage_class }}"
              size: 10Gi
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi
            additionalDataSources:
              - name: Loki
                type: loki
                url: "http://loki-stack.{{ monitoring_namespace }}.svc:3100"
                access: proxy

          kubeStateMetrics:
            enabled: true

          nodeExporter:
            enabled: true
        wait: true
        timeout: 10m

- name: Deploy Loki + Promtail (Logging Stack)
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tags: [loki, logging]
  vars:
    monitoring_namespace: monitoring
    loki_chart_version: "6.25.0"
    harbor_url: "{{ lookup('env', 'HARBOR_URL') | default('harbor.internal', true) }}"
    storage_class: "{{ lookup('env', 'STORAGE_CLASS') | default('cephfs', true) }}"

  tasks:
    - name: Add Grafana Helm repo
      kubernetes.core.helm_repository:
        name: grafana
        repo_url: "https://grafana.github.io/helm-charts"

    - name: Deploy Loki Stack
      kubernetes.core.helm:
        name: loki-stack
        chart_ref: grafana/loki-stack
        chart_version: "{{ loki_chart_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        values:
          loki:
            image:
              repository: "{{ harbor_url }}/grafana/loki"
            persistence:
              enabled: true
              storageClassName: "{{ storage_class }}"
              size: 100Gi
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: "1"
                memory: 4Gi
            config:
              limits_config:
                retention_period: 744h  # 31 days
                max_query_length: 721h
              compactor_config:
                working_directory: /data/loki/boltdb-shipper-compactor
                shared_store: filesystem
                compaction_interval: 10m
                retention_enabled: true
                retention_delete_delay: 2h
                retention_delete_worker_count: 150

          promtail:
            enabled: true
            image:
              repository: "{{ harbor_url }}/grafana/promtail"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

          fluent-bit:
            enabled: false

          grafana:
            enabled: false  # Using kube-prometheus-stack Grafana
        wait: true
        timeout: 5m

- name: Deploy Vector (Alternative Log Collector)
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tags: [vector]
  vars:
    monitoring_namespace: monitoring
    harbor_url: "{{ lookup('env', 'HARBOR_URL') | default('harbor.internal', true) }}"

  tasks:
    - name: Deploy Vector via Helm
      kubernetes.core.helm:
        name: vector
        chart_ref: vector/vector
        release_namespace: "{{ monitoring_namespace }}"
        values:
          role: Agent
          image:
            repository: "{{ harbor_url }}/timberio/vector"
          customConfig:
            sources:
              kubernetes_logs:
                type: kubernetes_logs
            sinks:
              loki:
                type: loki
                inputs:
                  - kubernetes_logs
                endpoint: "http://loki-stack.{{ monitoring_namespace }}.svc:3100"
                labels:
                  source: vector
        wait: true
        timeout: 5m

- name: Deploy Velero Backup
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tags: [velero, backup]
  vars:
    velero_namespace: velero
    velero_chart_version: "8.1.1"
    harbor_url: "{{ lookup('env', 'HARBOR_URL') | default('harbor.internal', true) }}"
    s3_endpoint: "{{ lookup('env', 'S3_ENDPOINT') | default('http://rgw.internal:8080', true) }}"
    s3_bucket: "{{ lookup('env', 'S3_BUCKET') | default('velero-backups', true) }}"

  tasks:
    - name: Create Velero namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ velero_namespace }}"

    - name: Deploy Velero via Helm
      kubernetes.core.helm:
        name: velero
        chart_ref: vmware-tanzu/velero
        chart_version: "{{ velero_chart_version }}"
        release_namespace: "{{ velero_namespace }}"
        values:
          image:
            repository: "{{ harbor_url }}/velero/velero"
          initContainers:
            - name: velero-plugin-for-aws
              image: "{{ harbor_url }}/velero/velero-plugin-for-aws:v1.11.0"
              volumeMounts:
                - name: plugins
                  mountPath: /target
          configuration:
            backupStorageLocation:
              - name: default
                provider: aws
                bucket: "{{ s3_bucket }}"
                default: true
                config:
                  region: us-east-1
                  s3ForcePathStyle: true
                  s3Url: "{{ s3_endpoint }}"
            volumeSnapshotLocation:
              - name: default
                provider: aws
                config:
                  region: us-east-1
          credentials:
            useSecret: true
            secretContents:
              cloud: |
                [default]
                aws_access_key_id={{ lookup('env', 'S3_ACCESS_KEY') | default('***', true) }}
                aws_secret_access_key={{ lookup('env', 'S3_SECRET_KEY') | default('***', true) }}
          schedules:
            daily-backup:
              schedule: "0 2 * * *"
              template:
                ttl: "168h"
                includedNamespaces:
                  - "*"
                excludedNamespaces:
                  - kube-system
                  - velero
            weekly-backup:
              schedule: "0 3 * * 0"
              template:
                ttl: "720h"
                includedNamespaces:
                  - "*"
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        wait: true
        timeout: 5m

- name: Deploy Velero UI
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tags: [velero-ui]
  vars:
    velero_namespace: velero
    harbor_url: "{{ lookup('env', 'HARBOR_URL') | default('harbor.internal', true) }}"

  tasks:
    - name: Deploy Velero UI via Helm
      kubernetes.core.helm:
        name: velero-ui
        chart_ref: backube/velero-ui
        release_namespace: "{{ velero_namespace }}"
        values:
          image:
            repository: "{{ harbor_url }}/backube/velero-ui"
          velero:
            namespace: "{{ velero_namespace }}"
          ingress:
            enabled: true
            ingressClassName: nginx
            hostname: velero-ui.internal
            tls: true
        wait: true
        timeout: 5m
