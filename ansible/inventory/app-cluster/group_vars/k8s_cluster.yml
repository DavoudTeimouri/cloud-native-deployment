# Application Cluster - K8s Cluster Group Variables

# === Kubernetes Version ===
kube_version: "{{ lookup('env', 'K8S_VERSION') | default('v1.31.4', true) }}"

# === Cluster Name ===
cluster_name: app-cluster

# === Container Runtime ===
container_manager: containerd

# === CNI Plugin ===
kube_network_plugin: calico

# === Calico Configuration ===
calico_iptables_backend: "Auto"
calico_ipip_mode: "Always"
calico_vxlan_mode: "Never"
calico_ip_autodetection_method: "interface=eth0"
calico_node_liveness_check_enabled: true

# === Pod and Service CIDR (MUST NOT overlap with mgmt cluster) ===
kube_pods_subnet: 10.245.0.0/16
kube_service_addresses: 10.112.0.0/12
kube_network_node_prefix: 24

# === Load Balancer (External HAProxy) ===
loadbalancer_apiserver:
  address: 10.2.0.100   # VIP managed by keepalived
  port: 6443

# === etcd Configuration ===
etcd_deployment_type: host
etcd_data_dir: /var/lib/etcd

# === API Server ===
kube_apiserver_node_port_range: "30000-32767"
kube_apiserver_enable_admission_plugins:
  - NodeRestriction
  - PodSecurity
  - ResourceQuota
  - ServiceAccount
  - DefaultStorageClass
  - DefaultTolerationSeconds
  - MutatingAdmissionWebhook
  - ValidatingAdmissionWebhook
  - Priority
  - NamespaceLifecycle
  - LimitRanger

# === Audit Logging ===
kubernetes_audit: true
audit_log_path: "/var/log/kubernetes/audit.log"
audit_log_maxage: 30
audit_log_maxbackups: 10
audit_log_maxsize: 200

# === Encryption at Rest ===
kube_encrypt_secret_data: true

# === Air-Gap Configuration ===
registry_host: "harbor.internal"
registry_port: "443"
registry_protocol: "https"

kube_image_repo: "{{ registry_host }}/k8s"
etcd_image_repo: "{{ registry_host }}/k8s/etcd"
calico_image_repo: "{{ registry_host }}/calico"
coredns_image_repo: "{{ registry_host }}/k8s/coredns"
dnsautoscaler_image_repo: "{{ registry_host }}/k8s/cluster-proportional-autoscaler"
metrics_server_image_repo: "{{ registry_host }}/k8s/metrics-server"
nginx_image_repo: "{{ registry_host }}/k8s/nginx"

containerd_registries:
  "harbor.internal":
    endpoints:
      - "https://harbor.internal"

containerd_insecure_registries:
  - "harbor.internal"

download_run_once: false
download_localhost: false

# === Node Labels ===
node_labels:
  app-worker-01:
    node-role.kubernetes.io/worker: "true"
  app-worker-02:
    node-role.kubernetes.io/worker: "true"
  app-worker-03:
    node-role.kubernetes.io/worker: "true"
  app-worker-04:
    node-role.kubernetes.io/worker: "true"
  app-worker-05:
    node-role.kubernetes.io/worker: "true"

# === Certificates ===
kube_cert_group: kube-cert-api
auto_renew_certificates: true

# === Additional sysctl ===
additional_sysctl:
  - { name: 'net.core.somaxconn', value: '65535' }
  - { name: 'net.ipv4.tcp_max_syn_backlog', value: '65535' }
  - { name: 'vm.max_map_count', value: '262144' }

# === Kubelet ===
kubelet_config_extra_args:
  maxPods: 110
  eventRecordQPS: 50
  eventBurst: 100
  kubeAPIQPS: 50
  kubeAPIBurst: 100
  serializeImagePulls: false

# === Kube-proxy ===
kube_proxy_mode: iptables

# === DNS ===
enable_nodelocaldns: true
nodelocaldns_ip: 169.254.25.10

# === Metrics Server ===
metrics_server_enabled: true

# === Upstream DNS ===
upstream_dns_servers:
  - 10.2.0.1
  - 10.2.0.2

searchdomains:
  - app.internal
  - internal
