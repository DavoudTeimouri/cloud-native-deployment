# Management Cluster - Ansible Inventory
# Customize IP addresses, hostnames, and node assignments for your environment

all:
  hosts:
    # === Master Nodes ===
    mgmt-master-01:
      ansible_host: 10.1.1.1
      ip: 10.1.1.1
      access_ip: 10.1.1.1
    mgmt-master-02:
      ansible_host: 10.1.1.2
      ip: 10.1.1.2
      access_ip: 10.1.1.2
    mgmt-master-03:
      ansible_host: 10.1.1.3
      ip: 10.1.1.3
      access_ip: 10.1.1.3
    mgmt-master-04:
      ansible_host: 10.1.1.4
      ip: 10.1.1.4
      access_ip: 10.1.1.4
    mgmt-master-05:
      ansible_host: 10.1.1.5
      ip: 10.1.1.5
      access_ip: 10.1.1.5

    # === Worker Nodes ===
    mgmt-worker-01:
      ansible_host: 10.1.2.1
      ip: 10.1.2.1
      access_ip: 10.1.2.1
    mgmt-worker-02:
      ansible_host: 10.1.2.2
      ip: 10.1.2.2
      access_ip: 10.1.2.2
    mgmt-worker-03:
      ansible_host: 10.1.2.3
      ip: 10.1.2.3
      access_ip: 10.1.2.3
    mgmt-worker-04:
      ansible_host: 10.1.2.4
      ip: 10.1.2.4
      access_ip: 10.1.2.4
    mgmt-worker-05:
      ansible_host: 10.1.2.5
      ip: 10.1.2.5
      access_ip: 10.1.2.5

    # === External Load Balancers ===
    mgmt-lb-01:
      ansible_host: 10.1.0.1
      ip: 10.1.0.1
      access_ip: 10.1.0.1
    mgmt-lb-02:
      ansible_host: 10.1.0.2
      ip: 10.1.0.2
      access_ip: 10.1.0.2

    # === Ceph Monitor Nodes ===
    mgmt-ceph-mon-01:
      ansible_host: 10.1.3.1
      ip: 10.1.3.1
      access_ip: 10.1.3.1
    mgmt-ceph-mon-02:
      ansible_host: 10.1.3.2
      ip: 10.1.3.2
      access_ip: 10.1.3.2
    mgmt-ceph-mon-03:
      ansible_host: 10.1.3.3
      ip: 10.1.3.3
      access_ip: 10.1.3.3
    mgmt-ceph-mon-04:
      ansible_host: 10.1.3.4
      ip: 10.1.3.4
      access_ip: 10.1.3.4
    mgmt-ceph-mon-05:
      ansible_host: 10.1.3.5
      ip: 10.1.3.5
      access_ip: 10.1.3.5

    # === Ceph OSD Nodes ===
    mgmt-ceph-osd-01:
      ansible_host: 10.1.4.1
      ip: 10.1.4.1
      access_ip: 10.1.4.1
    mgmt-ceph-osd-02:
      ansible_host: 10.1.4.2
      ip: 10.1.4.2
      access_ip: 10.1.4.2
    mgmt-ceph-osd-03:
      ansible_host: 10.1.4.3
      ip: 10.1.4.3
      access_ip: 10.1.4.3
    mgmt-ceph-osd-04:
      ansible_host: 10.1.4.4
      ip: 10.1.4.4
      access_ip: 10.1.4.4
    mgmt-ceph-osd-05:
      ansible_host: 10.1.4.5
      ip: 10.1.4.5
      access_ip: 10.1.4.5

  children:
    # K8s control plane
    kube_control_plane:
      hosts:
        mgmt-master-01:
        mgmt-master-02:
        mgmt-master-03:
        mgmt-master-04:
        mgmt-master-05:

    # etcd members (co-located on masters)
    etcd:
      hosts:
        mgmt-master-01:
        mgmt-master-02:
        mgmt-master-03:
        mgmt-master-04:
        mgmt-master-05:

    # K8s worker nodes
    kube_node:
      hosts:
        mgmt-worker-01:
        mgmt-worker-02:
        mgmt-worker-03:
        mgmt-worker-04:
        mgmt-worker-05:

    # External load balancers (for KubeSpray)
    balancer:
      hosts:
        mgmt-lb-01:
        mgmt-lb-02:

    # Ceph monitor nodes
    ceph_mon:
      hosts:
        mgmt-ceph-mon-01:
        mgmt-ceph-mon-02:
        mgmt-ceph-mon-03:
        mgmt-ceph-mon-04:
        mgmt-ceph-mon-05:

    # Ceph OSD nodes
    ceph_osd:
      hosts:
        mgmt-ceph-osd-01:
        mgmt-ceph-osd-02:
        mgmt-ceph-osd-03:
        mgmt-ceph-osd-04:
        mgmt-ceph-osd-05:
