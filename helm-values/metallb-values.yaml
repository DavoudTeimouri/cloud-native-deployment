# MetalLB Helm Values - Application Cluster Only
# Reference: https://metallb.universe.tf/

# Speaker (L2 mode by default)
speaker:
  image:
    repository: harbor.internal/metallb/speaker
    tag: v0.14.9
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # tolerations for running on all nodes
  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
      operator: Exists

# Controller
controller:
  image:
    repository: harbor.internal/metallb/controller
    tag: v0.14.9
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# FRR mode (BGP) - disabled by default, enable for BGP mode
frr:
  enabled: false

# CRDs
crds:
  enabled: true

# Prometheus monitoring
prometheus:
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s

# Speaker secret (for BGP peer authentication)
# speakerSecretName: metallb-speaker-secret
