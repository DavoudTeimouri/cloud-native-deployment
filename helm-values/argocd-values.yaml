# ArgoCD Helm Values - Management Cluster
# Reference: https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd

# Air-gap: Use Harbor registry
global:
  image:
    repository: harbor.internal/argoproj/argocd
    tag: v2.13.3
  securityContext: {}

# Server configuration
server:
  replicas: 2
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.mgmt.internal
    tls: true
    tlsSecretName: argocd-server-tls
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# Repo server
repoServer:
  replicas: 2
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# Application controller
controller:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

# Redis
redis:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Dex (SSO)
dex:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Notifications
notifications:
  enabled: true

# ApplicationSet controller
applicationSet:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Config
configs:
  params:
    server.insecure: false
  cm:
    # Timeout for repo operations
    timeout.reconciliation: 300s
    # Enable resource customizations
    resource.customizations: |
      networking.k8s.io/Ingress:
        health.lua: |
          hs = {}
          hs.status = "Healthy"
          return hs
  rbac:
    policy.default: ""
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, get, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, projects, *, *, allow
  ssh:
    # Known hosts for GitLab
    knownHosts: |
      gitlab.internal ssh-rsa AAAA...

# Node selector
nodeSelector:
  node-role.kubernetes.io/worker: "true"

# Image Updater
imageUpdater:
  enabled: false  # Enable for automatic image updates (limited in air-gap)
