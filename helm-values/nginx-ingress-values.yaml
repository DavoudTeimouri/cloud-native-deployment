# NGINX Ingress Controller Helm Values
# Both clusters: HTTP + TCP ingress

controller:
  kind: DaemonSet
  replicaCount: 1  # Ignored for DaemonSet
  
  # Production: use hostNetwork for direct access
  hostNetwork: true
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443
  
  # Service type (ClusterIP since we use hostNetwork)
  service:
    type: ClusterIP
    enableHttp: true
    enableHttps: true
  
  # Air-gap: Harbor registry
  image:
    repository: harbor.internal/ingress-nginx/controller
    tag: v1.12.1
    digest: ""
  admissionWebhooks:
    patch:
      image:
        repository: harbor.internal/ingress-nginx/kube-webhook-certgen
        tag: v1.5.2
  
  # NGINX configuration
  config:
    proxy-buffer-size: "16k"
    proxy-buffers-number: "4"
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    client-body-buffer-size: "16k"
    client-max-body-size: "100m"
    proxy-body-size: "100m"
    proxy-read-timeout: "600"
    proxy-send-timeout: "600"
    keep-alive: "75"
    keep-alive-requests: "10000"
    upstream-keep-alive-connections: "10000"
    upstream-keep-alive-timeout: "60"
    upstream-keep-alive-requests: "10000"
    worker-processes: "auto"
    max-worker-connections: "65535"
    max-worker-open-files: "65535"
  
  # TCP services config (key = port, value = namespace/service:port)
  # Add TCP services as needed
  tcp: {}
    # "5432": "default/postgres:5432"
    # "6379": "default/redis:6379"
    # "22": "gitea/gitea-ssh:22"
  
  # UDP services config
  udp: {}
    # "53": "kube-system/coredns:53"
  
  # Metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      interval: 30s
  
  # Resources
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # IngressClass
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  
  # Node selector
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  
  # Tolerations
  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
      operator: Exists

# Default backend
defaultBackend:
  enabled: true
  image:
    repository: harbor.internal/defaultbackend
    tag: "1.24"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
